name: HTML/JS CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.css'
      - '.github/workflows/html-js-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.css'
      - '.github/workflows/html-js-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install linters
        run: npm install -g htmlhint eslint

      - name: 🧹 Lint HTML (htmlhint)
        run: htmlhint "**/*.html" --ignore "node_modules/**"

      - name: 🧹 Lint JavaScript (eslint)
        run: eslint "**/*.js" --ignore-pattern "node_modules/**"

  # ════════════════════════════════════════════════════════
  # JOB 2 — Kódformázás cleanup + PR nyitás
  # ════════════════════════════════════════════════════════
  code-cleanup:
    name: Code Cleanup & Format PR
    needs: lint-and-validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Prettier
        run: npm install -g prettier

      - name: 🧹 Auto-fix: Prettier format
        run: |
          prettier --write "**/*.html" "**/*.js" "**/*.css" \
            --ignore-path .gitignore \
            --ignore "node_modules/**"

      - name: 🔍 Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 🌿 Create cleanup branch & PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/code-cleanup-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: auto code cleanup - Prettier format"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: auto code cleanup #${{ github.run_number }}" \
            --body "Automatikus kódformázás és cleanup:
            - Sorhossz és behúzások (Prettier)
            - HTML/JS/CSS formázás egységesítése

            Funkcionális változtatás: **nulla**." \
            --base ${{ github.ref_name }} \
            --head "$BRANCH"

  # ════════════════════════════════════════════════════════
  # SECURITY JOB — Vulnerability scan, secret check, coverage
  # ════════════════════════════════════════════════════════
  security-checks:
    name: Security & Coverage Checks
    needs: lint-and-validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Secret / credential leak detection ─────────────────────────────
      - name: 🔑 Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Vulnerability scan (auto-detects project type) ─────────────────
      - name: 🛡️ Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: 🐍 Python vulnerability scan (pip-audit)
        if: hashFiles('requirements*.txt', 'pyproject.toml') != ''
        run: |
          pip install pip-audit
          if [ -f "requirements.txt" ]; then
            pip-audit -r requirements.txt
          elif [ -f "pyproject.toml" ]; then
            pip-audit
          fi

      - name: 🟨 JS vulnerability scan (npm audit)
        if: hashFiles('package.json') != ''
        run: npm audit --audit-level=high

      # ── 3. Coverage threshold (skip if no test files found) ───────────────
      - name: 🐍 Coverage threshold — Python
        if: hashFiles('**/*.py') != ''
        run: |
          TEST_FILES=$(find . -name "test_*.py" -o -name "*_test.py" | grep -v node_modules | head -1)
          if [ -z "$TEST_FILES" ]; then
            echo "⚠️ No Python test files found. Skipping coverage check."
            exit 0
          fi
          pip install pytest pytest-cov
          pytest --cov=. --cov-fail-under=80 --cov-report=term-missing -q || {
            echo "❌ Coverage below 80%. CI failed."
            exit 1
          }

      - name: ☕ Coverage threshold — Kotlin
        if: hashFiles('**/*.kt') != ''
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            TEST_TASK=$(./gradlew tasks --all --no-daemon -q 2>/dev/null | grep -c "^test" || true)
            if [ "$TEST_TASK" -eq 0 ]; then
              echo "⚠️ No Kotlin test task found. Skipping coverage check."
              exit 0
            fi
            ./gradlew koverVerify --no-daemon || {
              echo "❌ Coverage below 80%. CI failed."
              exit 1
            }
          fi

      - name: 🟨 Coverage threshold — JS
        if: hashFiles('package.json') != ''
        run: |
          if [ -f "package.json" ]; then
            HAS_TEST=$(cat package.json | grep -c 'test' || true)
            if [ "$HAS_TEST" -eq 0 ]; then
              echo "⚠️ No JS test script found. Skipping coverage check."
              exit 0
            fi
            npm run test -- --coverage --coverageThreshold='{"global":{"lines":80}}' || {
              echo "❌ Coverage below 80%. CI failed."
              exit 1
            }
          fi
